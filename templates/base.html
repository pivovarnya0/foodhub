{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<title>FoodHub</title>

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
<link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
<link rel="stylesheet" href="{% static 'css/animate.css' %}">
<link rel="stylesheet" href="{% static 'css/owl.carousel.css' %}">
<link rel="stylesheet" href="{% static 'css/owl.theme.default.min.css' %}">
<link rel="stylesheet" href="{% static 'css/magnific-popup.css' %}">
<link rel="stylesheet" href="{% static 'css/templatemo-style.css' %}">

{% block extra_head %}{% endblock %}

</head>

<body>

<!-- HEADER -->
<header style="padding:20px;background:#111;color:white;">
<h2>FoodHub</h2>

<a href="/" style="color:white;margin-right:20px;">Home</a>
<a href="/profile/" style="color:white;margin-right:20px;">Profile</a>
<a href="/login/" style="color:white;margin-right:20px;">Login</a>
<a href="/logout/" style="color:white;margin-right:20px;">Logout</a>

<button onclick="toggleTheme()">Dark mode</button>

</header>

<!-- MAIN CONTENT -->
<main>

{% block content %}
{% endblock %}

</main>

<!-- FOOTER -->
<footer style="padding:20px;background:#111;color:white;text-align:center;">
FoodHub 2026
</footer>

<!-- SCRIPTS -->

<script src="{% static 'js/jquery.js' %}"></script>
<script src="{% static 'js/bootstrap.min.js' %}"></script>
<script src="{% static 'js/jquery.stellar.min.js' %}"></script>
<script src="{% static 'js/wow.min.js' %}"></script>
<script src="{% static 'js/owl.carousel.min.js' %}"></script>
<script src="{% static 'js/jquery.magnific-popup.min.js' %}"></script>
<script src="{% static 'js/smoothscroll.js' %}"></script>
<script src="{% static 'js/custom.js' %}"></script>

<script>

function toggleTheme(){

document.body.classList.toggle("dark-mode")

localStorage.setItem(
"theme",
document.body.classList.contains("dark-mode")
)

}

if(localStorage.getItem("theme") === "true"){
document.body.classList.add("dark-mode")
}

</script>


</body>
</html>
