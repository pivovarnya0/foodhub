<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Contact</title>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="message" placeholder="Введите сообщение">
        <button type="submit">Отправить</button>
    </form>

    {% if message %}
        <p>Вы ввели: {{ message }}</p>
    {% endif %}
</body>
</html>
