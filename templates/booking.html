{% extends 'base.html' %}

{% block content %}
<section class="py-5 auth-section">
    <div class="container">
        <div class="col-md-7 col-lg-5 mx-auto">
            <div class="card border-0 shadow-lg p-4 rounded-4">
                <h2 class="fw-bold mb-3">Book a Table at {{ restaurant.name }}</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Guests</label>
                        <input type="number" name="guests" min="1" class="form-control" required>
                    </div>
                    <button class="btn btn-warning w-100">Confirm Booking</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
