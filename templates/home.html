{% extends "base.html" %}
{% load static %}

{% block content %}

<!-- HERO -->

<section style="height:500px;background:url('{% static "images/slider-image1.jpg" %}') center/cover;display:flex;align-items:center;">

<div class="container">

<h1 style="color:white;font-size:60px;font-weight:700;">
Discover the best restaurants
</h1>

<p style="color:white;font-size:20px;">
Find your favorite place to eat
</p>

</div>

</section>


<!-- RESTAURANTS -->

<section style="padding:80px 0;">

<div class="container">

<h2 style="text-align:center;margin-bottom:60px;">
Our Restaurants
</h2>

<div class="row">

{% for restaurant in page_obj %}

<div class="col-md-4">

<div style="background:white;border-radius:10px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.1);margin-bottom:40px;">

<img src="{{ restaurant.image.url }}" style="width:100%;height:300px;object-fit:cover;">

<div style="padding:20px;">

<h3>{{ restaurant.name }}</h3>

<p>{{ restaurant.description|truncatewords:15 }}</p>

<a href="/restaurant/{{ restaurant.slug }}/" class="btn btn-danger">
View restaurant
</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</section>

{% endblock %}
